        }
        .hidden {

<script>
    const SCRIPT_URLS = {
        "12A3": "",
        "12A5": ""
    };
    function getScriptUrlByClass(lop) {
        const key = lop.trim().toUpperCase();
        return SCRIPT_URLS[key] || null;
    }
    
    // 50 CÂU HỎI TRẮC NGHIỆM VẬT LÝ - MỖI CÂU 0.2 ĐIỂM
    const rawQuestions = [
        {
            id: "q1", part: 1, type: "mcq", score: 0.2,
            text: "Chọn câu trả lời đúng.",
            options: [
                { key: "A", text: "Cường độ dòng điện cho biết độ mạnh hay yếu của dòng điện." },

        {

                { key: "B", text: "dòng điện có cường độ thay đổi theo thời gian." },
                { key: "C", text: "dòng điện có điện lượng chuyển qua tiết diện thẳng của dây thay đổi theo thời gian." },

                { key: "D", text: "có nguồn điện." }

        {
            id: "q5", part: 1, type: "mcq", score: 0.2,

        {

        },
        {
            id: "q7", part: 1, type: "mcq", score: 0.2,
            text: "1 Culông được hiểu là tổng điện lượng của các hạt mang điện chạy qua tiết diện thẳng của một dây dẫn",

        {
            id: "q15", part: 1, type: "mcq", score: 0.2,

                { key: "A", text: "Vôn kế." },

                { key: "C", text: "Ampe kế." },

        {
            id: "q16", part: 1, type: "mcq", score: 0.2,

    function escapeHtml(str) {
        return String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
    
    function formatScore(num) {
        return Number(num).toFixed(2).replace(".", ",");
    }
    
    function renderStructureNote() {
        const totalQuestions = questions.length;
        const totalScore = questions.reduce((s, q) => s + q.score, 0);
        document.getElementById("structure-note").innerHTML = `
            <b>Cấu trúc đề kiểm tra:</b><br>
            • Tổng số: ${totalQuestions} câu trắc nghiệm 4 lựa chọn.<br>
            • Điểm mỗi câu: 0,2 điểm.<br>
            <b>• Tổng điểm tối đa: ${formatScore(totalScore)} điểm.</b>
        `;
    }
    
    function checkStart() {
        btnStart.disabled = !(elHoTen.value.trim() && elLop.value.trim());
    }
    elHoTen.addEventListener("input", checkStart);
    elLop.addEventListener("input", checkStart);
    
    function renderQuestion(index) {
        const q = questions[index];
        let html = `
            <div class="question-box">
                <div class="question-meta">
                    Câu ${index + 1}/${questions.length}
                </div>
                <div class="question-head">${q.text || ""}</div>
        `;
        if (q.type === "mcq") {
            html += `<div class="options">`;
            q.options.forEach(opt => {
                const checked = answers[q.id] === opt.key ? "checked" : "";
                html += `
                    <label class="option-item">
                        <input type="radio" name="${q.id}" value="${opt.key}" ${checked}>
                        <span class="option-letter">${opt.key}.</span>
                        <div class="option-body">
                            <span class="option-body-text">${opt.text}</span>
                        </div>
                    </label>
                `;
            });
            html += `</div>`;
        }
        html += `</div>`;
        questionWrapper.innerHTML = html;
        
        if (q.type === "mcq") {
            document.querySelectorAll(`input[name="${q.id}"]`).forEach(el => {
                el.addEventListener("change", e => {
                    answers[q.id] = e.target.value;
                    updateActionButtons();
                });
            });
        }
        updateActionButtons();
    }
    
    function updateActionButtons() {
        btnPrev.classList.toggle("hidden", currentQIndex === 0);
        if (currentQIndex < questions.length - 1) {
            btnNext.classList.remove("hidden");
            btnSubmit.classList.add("hidden");
        } else {
            btnNext.classList.add("hidden");
            btnSubmit.classList.remove("hidden");
        }
    }
    
    btnStart.addEventListener("click", () => {
        studentInfo.classList.add("hidden");
        testArea.classList.remove("hidden");
        currentQIndex = 0;
        renderQuestion(currentQIndex);
    });
    
    btnPrev.addEventListener("click", () => {
        if (currentQIndex > 0) {
            currentQIndex--;
            renderQuestion(currentQIndex);
        }
    });
    
    btnNext.addEventListener("click", () => {
        if (currentQIndex < questions.length - 1) {
            currentQIndex++;
            renderQuestion(currentQIndex);
        }
    });
    
    function formatClientTime(d) {
        const pad = n => String(n).padStart(2, "0");
        return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    
    window.addEventListener("beforeunload", function(e) {
        if (isSaving) {
            e.preventDefault();
            e.returnValue = "Đang lưu dữ liệu, vui lòng chờ hoàn tất.";
        }
    });

        let soDung = 0;
        let soSai = 0;
        let soChuaLam = 0;
        
        questions.forEach(q => {
            if (!answers[q.id]) {
                soChuaLam++;
            } else if (answers[q.id] === q.answer) {
                soDung++;
                totalScore += q.score;
            } else {
                soSai++;
            }
        });
        
        totalScore = +totalScore.toFixed(2);
        
        testArea.classList.add("hidden");
        resultArea.classList.remove("hidden");
        const submitTime = formatClientTime(new Date());
        
        document.getElementById("student-result-info").innerHTML = `
            Họ và tên: ${escapeHtml(elHoTen.value)}<br>
            Lớp: ${escapeHtml(elLop.value)}<br>
            Thời gian nộp bài: ${submitTime}
        `;
        document.getElementById("res-score").textContent = formatScore(totalScore);
        document.getElementById("res-correct").textContent = soDung;
        document.getElementById("res-wrong").textContent = soSai;
        document.getElementById("res-empty").textContent = soChuaLam;
        
        const statusEl = document.getElementById("saveStatus");
        statusEl.innerHTML = "Đang lưu vào hệ thống...";
        statusEl.style.color = "#856404";
        
        const scriptUrl = getScriptUrlByClass(elLop.value);
        if (!scriptUrl) {
            statusEl.innerHTML = "❌ Chưa cấu hình lưu điểm cho lớp này. Kết quả của bạn chỉ được xem trên máy.";
            statusEl.style.color = "red";
            daGuiDuLieu = false;
            btnSubmit.disabled = false;
            return;
        }
        
        const payload = {
            hoTen: elHoTen.value.trim(),
            lop: elLop.value.trim().toUpperCase(),
            diem: totalScore,
            soDung: soDung,
            soSai: soSai,
            soChuaLam: soChuaLam,
            tongSoCau: questions.length,
            thoiGianNop: submitTime
        };
        
        try {
            isSaving = true;
            const res = await fetch(scriptUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            isSaving = false;
            if (data.result === "SUCCESS") {
                statusEl.innerHTML = "✅ Đã lưu điểm vào hệ thống.";
                statusEl.style.color = "green";
            } else if (data.result === "KHONG_TIM_THAY_HOC_SINH") {
                statusEl.innerHTML = "❌ Không tìm thấy học sinh trong hệ thống.";
                statusEl.style.color = "red";
                daGuiDuLieu = false;
                btnSubmit.disabled = false;
            } else {
                statusEl.innerHTML = "❌ Lỗi lưu: " + (data.message || "Không xác định");
                statusEl.style.color = "red";
                daGuiDuLieu = false;
                btnSubmit.disabled = false;
            }
        } catch (err) {
            isSaving = false;
            statusEl.innerHTML = "❌ Lỗi kết nối khi lưu điểm.";
            statusEl.style.color = "red";
            daGuiDuLieu = false;
            btnSubmit.disabled = false;
        }
    });
    
    btnReview.addEventListener("click", () => {
        resultArea.classList.add("hidden");
        reviewArea.classList.remove("hidden");
        renderReview();
    });
    
    btnRetry.addEventListener("click", () => location.reload());
    
    function renderReview() {
        let html = `<h2>Xem lại kết quả</h2>`;
        questions.forEach((q, idx) => {
            html += `<div class="review-box">`;
            html += `<div class="question-head">Câu ${idx + 1}: ${q.text}</div>`;
            
            q.options.forEach(opt => {
                const isUser = answers[q.id] === opt.key;
                const isCorrect = q.answer === opt.key;
                let style = "";
                if (isCorrect) style = "color:#1b8f2e;font-weight:700;";
                else if (isUser) style = "color:#d32f2f;text-decoration:line-through;font-weight:700;";
                html += `
                    <div style="${style}; margin-bottom:14px; display:flex; align-items:center; gap:10px;">
                        <span style="min-width:22px; flex:0 0 auto;">${isUser ? "☑" : "☐"}</span>
                        <span style="font-weight:700; min-width:28px; flex:0 0 auto;">${opt.key}.</span>
                        <span style="display:flex; align-items:center; gap:10px; flex-wrap:nowrap;">
                            <span>${opt.text}</span>
                        </span>
                    </div>
                `;
            });
            html += `</div>`;
        });
        html += `
            <div style="text-align:center; margin-top:20px;">
                <button onclick="location.reload()" style="background:#28a745; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Làm lại bài</button>
            </div>
        `;
        reviewArea.innerHTML = html;
    }
    
    renderStructureNote();
</script>
</body>
</html>
